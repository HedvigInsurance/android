name: PR

on: pull_request

concurrency:
  group: ref-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit_test:
    runs-on: ubuntu-latest-8-vcpu
    steps:
      - uses: actions/checkout@v6
      - name: Setup CI
        uses: ./.github/actions/common-setup
        with:
          gradle-cache-read-only: 'false'
          datadog-api-key: ${{ secrets.DATADOG_API_KEY }}
          lokalise-id: ${{ secrets.LOKALISE_ID }}
          lokalise-token: ${{ secrets.LOKALISE_TOKEN }}
      - name: Unit tests
        # `test` only runs tasks literally named `test` (Android `testDebugUnitTest`, JVM-library
        # `test`). KMP modules expose their commonTest as `jvmTest`, which `test` never triggers, so
        # add it explicitly. `jvmTest` (not `allTests`/`check`) keeps this off the iOS targets that
        # can't run on the Linux runner.
        run: ./gradlew test jvmTest
  lint:
    runs-on: ubuntu-latest-8-vcpu
    steps:
      - uses: actions/checkout@v6
      - name: Setup CI
        uses: ./.github/actions/common-setup
        with:
          gradle-cache-read-only: 'false'
          datadog-api-key: ${{ secrets.DATADOG_API_KEY }}
          lokalise-id: ${{ secrets.LOKALISE_ID }}
          lokalise-token: ${{ secrets.LOKALISE_TOKEN }}
      - run: ./gradlew lint
      - uses: yutailang0119/action-android-lint@v5.0.0
        with:
          report-path: app/build/reports/lint-results-debug.xml
        continue-on-error: true
  ktlint:
    runs-on: ubuntu-latest-8-vcpu
    steps:
      - uses: actions/checkout@v6
      - name: Setup CI
        uses: ./.github/actions/common-setup
        with:
          gradle-cache-read-only: 'false'
          datadog-api-key: ${{ secrets.DATADOG_API_KEY }}
          lokalise-id: ${{ secrets.LOKALISE_ID }}
          lokalise-token: ${{ secrets.LOKALISE_TOKEN }}
      - name: run ktlint from gradle
        continue-on-error: true
        run: ./gradlew ktlintCheck
      - name: Annotate ktlint errors in the PR
        continue-on-error: false
        uses: yutailang0119/action-ktlint@v5
        with:
          report-path: build/reports/ktlint/*.xml
  build:
    runs-on: ubuntu-latest-8-vcpu
    steps:
      - uses: actions/checkout@v6
      - name: Setup CI
        uses: ./.github/actions/common-setup
        with:
          gradle-cache-read-only: 'false'
          datadog-api-key: ${{ secrets.DATADOG_API_KEY }}
          lokalise-id: ${{ secrets.LOKALISE_ID }}
          lokalise-token: ${{ secrets.LOKALISE_TOKEN }}
      - run: echo VERSION_CODE=$(expr 4700 + ${{ github.run_number }} + ${{ github.run_attempt }} - 1) >> $GITHUB_ENV
      - uses: chkfung/android-version-actions@v1.2
        with:
          gradlePath: app/app/build.gradle.kts
          versionCode: ${{ env.VERSION_CODE }}
      - name: Run license release report
        run: ./gradlew licenseReleaseReport --no-configuration-cache --continue
        continue-on-error: true
      - name: OSS license gate (warn-only)
        # Reuses the report generated just above (no extra Gradle run). Warn-only for the
        # pilot: continue-on-error + enforce=false. To enforce: pass `true` and drop
        # continue-on-error so a forbidden license blocks the build.
        run: bash .github/scripts/license-gate.sh app/app/build/reports/licenses/licenseReleaseReport.json false
        continue-on-error: true
      - name: Build
        run: "./gradlew :app:bundleDebug"
      - name: Setup build tool version variable
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "BUILD_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
          echo Last build tool version is: $BUILD_TOOL_VERSION
      - uses: r0adkll/sign-android-release@v1
        name: Sign app AAB
        id: sign_app
        with:
          releaseDirectory: app/app/build/outputs/bundle/debug
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOL_VERSION }}
      - uses: actions/upload-artifact@v7
        with:
          name: Pull Request-Build
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
