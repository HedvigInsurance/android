query GetPayinMethodStatus {
  currentMember {
    paymentInformation {
      status
    }
    activeContracts {
      terminationDate
      terminationDueToMissedPayments
      id
    }
    paymentMethods {
      missingConnection
      payoutMethods {
        status
        isDefault
      }
      availableMethods {
        provider
      }
    }
  }
}
