query UpcomingPayment(
  $manualChargeEnabled: Boolean!
) {
  currentMember {
    missedChargeIdToChargeManually @include(if: $manualChargeEnabled)
    pastCharges {
      ...on MemberCharge {
        id
        status
        net {
          ...MoneyFragment
        }
      }
    }
    activeContracts {
      terminationDueToMissedPayments
      terminationDate
    }
    futureCharge {
      ...MemberChargeFragment
    }
    ongoingCharges {
      id
      date
      net {
        ...MoneyFragment
      }
    }
    paymentMethods {
      payinMethods {
        ...MemberPaymentMethodFragment
      }
      defaultPayinMethod {
        ...MemberPaymentMethodFragment
      }
    }
  }
}

fragment MemberChargeFragment on MemberCharge {
  id
  chargeBreakdown {
    displayTitle
    displaySubtitle
    gross {
      ...MoneyFragment
    }
    net {
      ...MoneyFragment
    }
    periods {
      fromDate
      toDate
      amount {
        ...MoneyFragment
      }
      isPreviouslyFailedCharge
    }
    insurancePriceBreakdown {
      displayTitle
      amount {
        ...MoneyFragment
      }
    }
  }
  date
  gross {
    ...MoneyFragment
  }
  net {
    ...MoneyFragment
  }
  status
  carriedAdjustment {
    ...MoneyFragment
  }
  settlementAdjustment {
    ...MoneyFragment
  }
  referralDiscount {
    ...MoneyFragment
  }
  paymentProvider
}

fragment MemberChargeBreakdownItemDiscountFragment on MemberChargeBreakdownItemDiscount {
  code
  description
  discount {
    ...MoneyFragment
  }
}
