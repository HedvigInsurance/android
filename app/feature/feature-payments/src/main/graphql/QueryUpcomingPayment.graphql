query UpcomingPayment {
  currentMember {
    activeContracts {
      terminationDueToMissedPayments
      terminationDate
    }
    futureCharge {
      ...MemberChargeFragment
    }
    ongoingCharges {
      id
      date
      net {
        ...MoneyFragment
      }
    }
    paymentMethods {
      payinMethods {
        ...MemberPaymentMethodFragment
      }
      defaultPayinMethod {
        ...MemberPaymentMethodFragment
      }
      chargingDay
    }
  }
}

fragment MemberPaymentMethodFragment on MemberPaymentMethod {
  provider
  status
  isDefault
  details {
    ... on PaymentMethodInvoiceDetails {
      delivery
      email
    }
    ... on PaymentMethodSwishDetails {
      phoneNumber
    }
    ... on PaymentMethodBankAccountDetails {
      account
      bank
    }
  }
}

fragment MemberChargeFragment on MemberCharge {
  id
  chargeBreakdown {
    displayTitle
    displaySubtitle
    gross {
      ...MoneyFragment
    }
    net {
      ...MoneyFragment
    }
    periods {
      fromDate
      toDate
      amount {
        ...MoneyFragment
      }
      isPreviouslyFailedCharge
    }
    insurancePriceBreakdown {
      displayTitle
      amount {
        ...MoneyFragment
      }
    }
  }
  date
  gross {
    ...MoneyFragment
  }
  net {
    ...MoneyFragment
  }
  status
  carriedAdjustment {
    ...MoneyFragment
  }
  settlementAdjustment {
    ...MoneyFragment
  }
  referralDiscount {
    ...MoneyFragment
  }
  paymentProvider
}

fragment MemberChargeBreakdownItemDiscountFragment on MemberChargeBreakdownItemDiscount {
  code
  description
  discount {
    ...MoneyFragment
  }
}
