query ManualChargeInfo {
  currentMember {
    missedChargeIdToChargeManually
    pastCharges {
      ...on MemberCharge {
        id
        date
        status
        net {
          ...MoneyFragment
        }
      }
    }
    paymentInformation {
      status
      chargeMethod {
        displayName
        descriptor
        paymentMethod
      }
    }
  }
}
