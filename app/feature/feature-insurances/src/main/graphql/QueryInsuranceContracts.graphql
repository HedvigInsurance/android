query InsuranceContracts(
  $addonsEnabled: Boolean!,
  $options: DisplayItemOptions) {
  currentMember {
    memberActions {
      isMovingEnabled
    }
    firstName
    lastName
    ssn
    terminatedContracts {
      ...ContractFragment
    }

    activeContracts {
      ...ContractFragment
    }

    pendingContracts {
      id
      premium {
        ...MoneyFragment
      }
      productVariant {
        ...ProductVariantFragment
      }
      exposureDisplayName
      displayItems {
        ...AgreementDisplayItemFragment
      }
      addons @include(if: $addonsEnabled) {
        addonVariant {
          ...AddonVariantFragment
        }
        premium {
          ...MoneyFragment
        }
      }
      cost {
        ...MonthlyCostFragment
      }
      basePremium {
        ...MoneyFragment
      }
    }
  }
}

fragment ContractFragment on Contract {
  id
  masterInceptionDate
  terminationDate
  exposureDisplayName
  supportsMoving
  supportsCoInsured
  supportsChangeTier
  supportsCoOwners
  coInsured {
    ...ContractCoInsuredFragment
  }
  coOwners {
    ...ContractCoOwnerFragment
  }
  currentAgreement {
    ...AgreementFragment
  }
  upcomingChangedAgreement {
    ...AgreementFragment
  }
  existingAddons @include(if: $addonsEnabled) {
    addonVariant {
      ...AddonVariantFragment
    }
    displayName
    description
    isRemovable
    isUpgradable
    startDate
    endDate
  }
  availableAddons @include(if: $addonsEnabled) {
    displayName
    description
  }
  missingPetId
}

fragment AgreementFragment on Agreement {
  activeFrom
  activeTo
  certificateUrl
  creationCause
  displayItems (options: $options) {
    ...AgreementDisplayItemFragment
  }
  productVariant {
    ...ProductVariantFragment
  }
  addons @include(if: $addonsEnabled) {
    addonVariant {
      ...AddonVariantFragment
    }
    premium {
      ...MoneyFragment
    }
  }
  cost {
    ...MonthlyCostFragment
  }
  basePremium {
    ...MoneyFragment
  }
}

fragment AgreementDisplayItemFragment on AgreementDisplayItem {
  displayTitle
  displayValue
}

fragment MonthlyCostFragment on ItemCost {
  monthlyGross {
    ...MoneyFragment
  }
  monthlyNet {
    ...MoneyFragment
  }
  discounts {
    displayName
    displayValue
    explanation
    campaignCode
  }
}

fragment ContractCoInsuredFragment on ContractCoInsured {
  firstName
  lastName
  ssn
  birthdate
  hasMissingInfo
  activatesOn
  terminatesOn
}

fragment ContractCoOwnerFragment on ContractCoOwner {
  firstName
  lastName
  ssn
  birthdate
  hasMissingInfo
  activatesOn
  terminatesOn
}
