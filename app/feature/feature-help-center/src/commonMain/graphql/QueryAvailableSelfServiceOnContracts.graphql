query AvailableSelfServiceOnContracts {
  currentMember {
    activeContracts {
      id
      exposureDisplayName
      currentAgreement {
        productVariant {
          displayName
        }
      }
      supportsCoInsured
      supportsCoOwners
      coInsured {
        hasMissingInfo
      }
      coOwners {
        hasMissingInfo
      }
    }
  }
}
