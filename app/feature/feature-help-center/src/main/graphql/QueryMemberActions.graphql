query MemberActions {
  currentMember {
    memberActions {
      firstVetAction {
        sections {
          buttonTitle
          description
          title
          url
        }
      }
      isCancelInsuranceEnabled
      isConnectPaymentEnabled
      isEditCoInsuredEnabled
      isEditCoOwnersEnabled
      isMovingEnabled
      isTravelCertificateEnabled
      isChangeTierEnabled
      memberId
      sickAbroadDeflect {
        title
        infoText
        warningText
        partners {
          id
          imageUrl
          phoneNumber
          title
          description
          info
          url
          urlButtonTitle
        }
        simplePartners {
          url
          urlButtonTitle
        }
        partnersInfo {
          title
          description
        }
        content {
          title
          description
        }
        faq {
          title
          description
        }
        buttonTitle
      }
    }
  }
}
