query GetPayoutMethods {
  currentMember {
    paymentMethods {
      defaultPayoutMethod {
        id
        provider
        details {
          ... on PaymentMethodBankAccountDetails {
            account
            bank
          }
          ... on PaymentMethodSwishDetails {
            phoneNumber
          }
        }
      }
      availableMethods {
        provider
        supportsPayout
      }
    }
  }
}
