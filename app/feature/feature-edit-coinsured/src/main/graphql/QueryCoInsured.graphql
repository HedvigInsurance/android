query CoInsured {
  currentMember {
    firstName
    lastName
    ssn
    activeContracts {
      id
      coInsured {
        ...CoInsuredFragment
      }
      coOwners {
        ...CoOwnerFragment
      }
    }
  }
}

fragment CoInsuredFragment on ContractCoInsured {
  firstName
  lastName
  ssn
  birthdate
  hasMissingInfo
  activatesOn
  terminatesOn
}

fragment CoOwnerFragment on ContractCoOwner {
  firstName
  lastName
  ssn
  birthdate
  hasMissingInfo
  activatesOn
  terminatesOn
}
