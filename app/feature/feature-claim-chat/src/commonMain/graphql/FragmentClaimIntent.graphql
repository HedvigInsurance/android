fragment ClaimIntentFragment on ClaimIntent {
  id
  progress
  displayName
  resumable
  currentStep {
    id
    text
    hint
    content {
      ...ClaimIntentStepContentFragment
    }
    isRegrettable
  }
  createdClaim {
    id
    submittedAt
  }
  previousSteps {
    id
    text
    hint
    content {
      ...ClaimIntentStepContentFragment
    }
    isRegrettable
  }
}

fragment ClaimIntentStepContentFragment on ClaimIntentStepContent {
  ...FormFragment
  ...ContentSelectFragment
  ...TaskFragment
  ...AudioRecordingFragment
  ...FileUploadFragment
  ...SummaryFragment
  ...DeflectionFragment
  ...DeflectionMessageFragment
  ...InformationFragment
}

fragment DeflectionMessageFragment on ClaimIntentStepContentDeflectionMessage {
  message
}

fragment FormFragment on ClaimIntentStepContentForm {
  fields {
    id
    type
    title
    suffix
    isRequired
    options {
      title
      subtitle
      value
    }
    defaultValues
    currentValues
    minValue
    maxValue
    searchData {
      suggestedQuery
      modalTitle
      modalSubtitle
    }
  }
  isSkippable
}

fragment ContentSelectFragment on ClaimIntentStepContentSelect {
  options {
    id
    title
  }
  isSkippable
  style
  defaultSelectedId
  currentSelectedId
}

fragment TaskFragment on ClaimIntentStepContentTask {
  description
  isCompleted
}

fragment AudioRecordingFragment on ClaimIntentStepContentAudioRecording {
  uploadUri
  isSkippable
  freeTextMinLength
  freeTextMaxLength
  currentAudioUrl
  currentFreeText
}

fragment FileUploadFragment on ClaimIntentStepContentFileUpload {
  uploadUri
  isSkippable
  currentFiles {
    url
    contentType
    fileName
  }
}

fragment SummaryFragment on ClaimIntentStepContentSummary {
  items {
    title
    value
  }
  audioRecordings {
    url
  }
  fileUploads {
    url
    contentType
    fileName
  }
  freeTexts
  keyDetails {
    title
    value
  }
  answers {
    title
    value {
      ... on ClaimIntentStepContentSummaryAnswerText {
        text
      }
      ... on ClaimIntentStepContentSummaryAnswerAudio {
        url
        transcript
      }
      ... on ClaimIntentStepContentSummaryAnswerFiles {
        files {
          url
          contentType
          fileName
        }
      }
    }
  }
}

fragment DeflectionFragment on ClaimIntentStepContentDeflection {
  title
  infoText
  warningText
  partners {
    id
    imageUrl
    phoneNumber
    title
    description
    info
    url
    urlButtonTitle
  }
  simplePartners {
    url
    urlButtonTitle
  }
  partnersInfo {
    ...DeflectionInfoBlockFragment
  }
  content {
    ...DeflectionInfoBlockFragment
  }
  faq {
    ...DeflectionInfoBlockFragment
  }
  buttonTitle
}

fragment DeflectionInfoBlockFragment on ClaimIntentStepContentDeflectionInfoBlock {
  title
  description
}

fragment InformationFragment on ClaimIntentStepContentInformation {
  notice
  buttonTitle
  severity
}
