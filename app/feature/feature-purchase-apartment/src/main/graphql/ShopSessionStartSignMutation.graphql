mutation ApartmentStartSign($shopSessionId: UUID!) {
  shopSessionStartSign(shopSessionId: $shopSessionId) {
    signing {
      id
      status
      seBankidProperties {
        autoStartToken
        liveQrCodeData
        bankidAppOpened
      }
      userError {
        message
      }
    }
    userError {
      message
    }
  }
}
