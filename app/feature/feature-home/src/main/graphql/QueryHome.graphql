query Home($claimsHistoryFlag: Boolean!) {
  currentMember {
    claims@skip(if: $claimsHistoryFlag) {
      ...ClaimFragment
    }
    claimsActive@include(if: $claimsHistoryFlag) {
      ...ClaimFragment
    }
    partnerClaimsActive {
      ...PartnerClaimFragment
    }
    terminatedContracts {
      id
      currentAgreement {
        productVariant {
          typeOfContract
        }
      }
    }
    pendingContracts {
      id
      externalInsuranceCancellationHandledByHedvig
      exposureDisplayName

        productVariant {
          typeOfContract
        }

    }
    importantMessages {
      id
      message
      linkInfo {
        url
        buttonText
      }
    }
    crossSellV2(input: { userFlow: HOME_X_SELL, flowSource: null, experiments: [] }) {
      recommendedCrossSell {
        crossSell {
          ...HomeCrossSellFragment
        }
        bannerText
        discountText
        buttonText
        buttonDescription
        numberOfEligibleContracts
        discountPercent
        backgroundPillowImages {
          leftImage {
            src
          }
          rightImage {
            src
          }
        }
      }
      otherCrossSells {
        ...HomeCrossSellFragment
      }
    }
    memberActions {
      firstVetAction {
        sections {
          title
          buttonTitle
          description
          url
        }
      }
    }
    activeContracts {
      id
      masterInceptionDate
      currentAgreement {
        productVariant {
          typeOfContract
        }
      }
    }
    ongoingShopSessions {
      ...OngoingShopSessionFragment
    }
  }
}

fragment OngoingShopSessionFragment on ShopSession {
  id
  display {
    title
    subtitle
    monthlyNet {
      amount
      currencyCode
    }
    lastActivityAt
    resumeUrl
    validTo
  }
  cart {
    items {
      productOffer {
        product {
          id
          pillowImage {
            id
            src
            alt
          }
        }
      }
    }
  }
  priceIntents(filters: { uniqueConfirmed: true }) {
    product {
      id
      pillowImage {
        id
        src
        alt
      }
    }
  }
}

fragment HomeCrossSellFragment on CrossSell {
  id
  title
  description
  storeUrl
  pillowImageLarge {
    src
    id
    alt
  }
}
