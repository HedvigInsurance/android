mutation UpdateChipIdNumber($petId: String!, $contractId: ID!) {
  midtermChangePetId(petId: $petId, contractId: $contractId) {
    ...on MidtermChangePetIdOutput {
      ... on MidtermChangePetIdActivationDate {
        activationDate
      }
      ... on UserError {
        message
      }
    }
  }
}
