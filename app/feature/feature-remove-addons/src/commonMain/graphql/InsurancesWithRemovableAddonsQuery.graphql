query InsurancesWithRemovableAddons {
  currentMember {
    activeContracts {
      id
      exposureDisplayName
      currentAgreement {
        productVariant {
          ...ProductVariantFragment
        }
        addons {
          addonVariant {
            displayName
          }
          premium {
            ...MoneyFragment
          }
        }
      }
    }
  }
}
